<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ─── Reset & Base ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --primary: #6C63FF;
            --primary-hover: #5a52e0;
            --primary-light: #f0eeff;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.10);
            --transition: 0.2s ease;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            min-height: 100vh;
        }
        a {
            color: var(--primary);
            text-decoration: none;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            border: none;
            background: none;
            transition: var(--transition);
        }
        input,
        select,
        textarea {
            font-family: inherit;
            font-size: inherit;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 10px 14px;
            width: 100%;
            background: #fff;
            transition: var(--transition);
            outline: none;
            color: var(--gray-800);
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        label {
            display: block;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--gray-700);
            margin-bottom: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group .hint {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 2px;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.30);
        }
        .btn-outline {
            background: transparent;
            color: var(--gray-600);
            border-color: var(--gray-200);
        }
        .btn-outline:hover {
            background: var(--gray-100);
            border-color: var(--gray-300);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.75rem;
        }
        .btn-icon {
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1;
            color: var(--gray-500);
            background: transparent;
            border: 1px solid transparent;
        }
        .btn-icon:hover {
            background: var(--gray-100);
            color: var(--gray-700);
        }
        .btn-icon.danger:hover {
            background: #fef2f2;
            color: var(--danger);
        }

        /* ─── Layout ─── */
        #app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 60px;
        }

        /* ─── Header ─── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 24px;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header h1 .badge {
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 4px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-actions .stats {
            font-size: 0.8rem;
            color: var(--gray-500);
            background: var(--gray-100);
            padding: 4px 14px;
            border-radius: 20px;
        }

        /* ─── Views ─── */
        .view {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .view.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── Dashboard: List Cards ─── */
        .dashboard-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .dashboard-top h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .dashboard-top .sub {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .list-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px 22px 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-100);
            transition: var(--transition);
        }
        .list-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .list-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .list-card .card-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--gray-900);
            word-break: break-word;
        }
        .list-card .card-desc {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .list-card .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--gray-500);
            margin-top: 10px;
        }
        .list-card .card-meta .count {
            font-weight: 500;
            color: var(--gray-700);
        }
        .list-card .progress-wrap {
            margin-top: 12px;
            background: var(--gray-100);
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
            position: relative;
        }
        .list-card .progress-wrap .bar {
            height: 100%;
            border-radius: 20px;
            background: var(--primary);
            transition: width 0.5s ease;
            width: 0%;
        }
        .list-card .progress-wrap .bar.complete {
            background: var(--success);
        }
        .list-card .card-actions {
            display: flex;
            gap: 4px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--gray-100);
            flex-wrap: wrap;
        }
        .list-card .card-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .list-card .card-actions .btn-outline {
            flex: 0 1 auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state h3 {
            color: var(--gray-700);
            font-weight: 500;
        }
        .empty-state p {
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* ─── Task View ─── */
        .task-view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .task-view-header .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .task-view-header .left .back-btn {
            color: var(--gray-500);
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: var(--transition);
        }
        .task-view-header .left .back-btn:hover {
            background: var(--gray-100);
            color: var(--gray-700);
        }
        .task-view-header .list-info h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .task-view-header .list-info .desc {
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        .task-view-header .list-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--gray-600);
        }
        .task-view-header .list-progress .mini-bar {
            width: 100px;
            height: 4px;
            background: var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }
        .task-view-header .list-progress .mini-bar .fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .task-table-wrap {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--gray-100);
            overflow: auto;
            box-shadow: var(--shadow);
        }
        .task-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .task-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--gray-50);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--gray-500);
            border-bottom: 1px solid var(--gray-200);
        }
        .task-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }
        .task-table tr:last-child td {
            border-bottom: none;
        }
        .task-table tr:hover td {
            background: var(--gray-50);
        }

        .task-table .task-check {
            width: 36px;
            text-align: center;
        }
        .task-table .task-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            border-radius: 4px;
        }
        .task-table .task-title {
            font-weight: 500;
            color: var(--gray-800);
        }
        .task-table .task-title .sub {
            font-weight: 400;
            font-size: 0.8rem;
            color: var(--gray-400);
            display: block;
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-table .task-title.closed .main {
            text-decoration: line-through;
            color: var(--gray-400);
        }
        .task-table .task-priority {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .task-priority.high {
            background: #fef2f2;
            color: #dc2626;
        }
        .task-priority.medium {
            background: #fffbeb;
            color: #d97706;
        }
        .task-priority.low {
            background: #eff6ff;
            color: #2563eb;
        }
        .task-table .task-due {
            font-size: 0.8rem;
            color: var(--gray-500);
            white-space: nowrap;
        }
        .task-table .task-actions {
            display: flex;
            gap: 2px;
            justify-content: flex-end;
        }
        .task-table .task-status-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .task-status-badge.open {
            background: #e0f2fe;
            color: #0284c7;
        }
        .task-status-badge.closed {
            background: #dcfce7;
            color: #16a34a;
        }

        .task-table .empty-tasks {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
        }
        .task-table .empty-tasks .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        /* ─── Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            max-width: 520px;
            width: 100%;
            padding: 28px 32px 32px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .modal .modal-header .close-btn {
            font-size: 1.5rem;
            color: var(--gray-400);
            padding: 0 4px;
            line-height: 1;
            transition: var(--transition);
        }
        .modal .modal-header .close-btn:hover {
            color: var(--gray-700);
            transform: rotate(90deg);
        }
        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .modal .modal-actions .btn {
            min-width: 80px;
            justify-content: center;
        }
        .modal .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 480px) {
            .modal .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            #app {
                padding: 12px 14px 40px;
            }
            .app-header h1 {
                font-size: 1.2rem;
            }
            .app-header h1 .badge {
                font-size: 0.6rem;
                padding: 1px 8px;
            }
            .list-grid {
                grid-template-columns: 1fr;
            }
            .task-view-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .task-view-header .left {
                flex-wrap: wrap;
            }
            .task-table th,
            .task-table td {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            .task-table .task-title .sub {
                max-width: 120px;
            }
            .task-table .task-actions .btn-icon {
                padding: 4px 6px;
                font-size: 0.85rem;
            }
            .modal {
                padding: 20px 18px 24px;
                margin: 10px;
            }
            .list-card .card-actions .btn {
                font-size: 0.75rem;
                padding: 6px 10px;
            }
            .header-actions .stats {
                font-size: 0.7rem;
                padding: 2px 10px;
            }
        }
        @media (max-width: 400px) {
            .task-table .task-priority {
                font-size: 0.6rem;
                padding: 1px 6px;
            }
            .task-table .task-status-badge {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
        }

        /* ─── Utilities ─── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        .flex-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .gap-2 {
            gap: 8px;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .text-sm {
            font-size: 0.8rem;
        }
        .text-muted {
            color: var(--gray-500);
        }
        .fw-500 {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ─── HEADER ─── -->
    <header class="app-header">
        <h1>
            📋 Task Manager
            <span class="badge">v1</span>
        </h1>
        <div class="header-actions">
            <span class="stats" id="globalStats">0 lists · 0 tasks</span>
            <button class="btn btn-primary" id="addListBtn">+ New List</button>
        </div>
    </header>

    <!-- ─── DASHBOARD VIEW ─── -->
    <section id="dashboardView" class="view active">
        <div class="dashboard-top">
            <div>
                <h2>Your Task Lists</h2>
                <span class="sub">Organize your work, one list at a time</span>
            </div>
        </div>
        <div id="listGrid" class="list-grid"></div>
    </section>

    <!-- ─── TASK VIEW ─── -->
    <section id="taskView" class="view">
        <div class="task-view-header">
            <div class="left">
                <button class="back-btn" id="backToDashboard" aria-label="Back">←</button>
                <div class="list-info">
                    <h2 id="taskViewTitle">List Name</h2>
                    <div class="desc" id="taskViewDesc">Description</div>
                </div>
            </div>
            <div class="list-progress">
                <span id="taskViewProgressText">0 / 0</span>
                <div class="mini-bar"><div class="fill" id="taskViewProgressFill" style="width:0%"></div></div>
                <button class="btn btn-primary btn-sm" id="addTaskBtn">+ Add Task</button>
            </div>
        </div>
        <div class="task-table-wrap">
            <table class="task-table">
                <thead>
                <tr>
                    <th class="task-check"><span class="sr-only">Done</span></th>
                    <th>Task</th>
                    <th>Priority</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th style="text-align:right">Actions</th>
                </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>
        </div>
    </section>

    <!-- ─── MODAL: List ─── -->
    <div class="modal-overlay" id="listModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="listModalTitle">New Task List</h3>
                <button class="close-btn" data-close="listModal">✕</button>
            </div>
            <form id="listForm" autocomplete="off">
                <input type="hidden" id="listFormId" value="" />
                <div class="form-group">
                    <label for="listTitle">Title <span class="text-muted">*</span></label>
                    <input type="text" id="listTitle" placeholder="e.g. Work Projects" required />
                </div>
                <div class="form-group">
                    <label for="listDesc">Description</label>
                    <textarea id="listDesc" placeholder="Optional description…" rows="2"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" data-close="listModal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="listSubmitBtn">Create List</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ─── MODAL: Task ─── -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="taskModalTitle">New Task</h3>
                <button class="close-btn" data-close="taskModal">✕</button>
            </div>
            <form id="taskForm" autocomplete="off">
                <input type="hidden" id="taskFormId" value="" />
                <input type="hidden" id="taskFormListId" value="" />
                <div class="form-group">
                    <label for="taskTitle">Title <span class="text-muted">*</span></label>
                    <input type="text" id="taskTitle" placeholder="e.g. Review design" required />
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" placeholder="Optional details…" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskDue">Due Date</label>
                        <input type="date" id="taskDue" />
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus">
                        <option value="OPEN">Open</option>
                        <option value="CLOSED">Closed</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" data-close="taskModal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="taskSubmitBtn">Create Task</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  DATA LAYER (localStorage)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const STORAGE_KEY = 'taskManagerData';

    function getDefaultData() {
        return { lists: [] };
    }

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return getDefaultData();
            const parsed = JSON.parse(raw);
            // ensure each list has a tasks array
            if (Array.isArray(parsed.lists)) {
                parsed.lists.forEach(l => {
                    if (!Array.isArray(l.tasks)) l.tasks = [];
                });
            } else {
                parsed.lists = [];
            }
            return parsed;
        } catch (_) {
            return getDefaultData();
        }
    }

    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  STATE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    let data = loadData();
    let currentListId = null; // which list we're viewing

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  DOM REFS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const dashboardView = $('#dashboardView');
    const taskView = $('#taskView');
    const listGrid = $('#listGrid');
    const taskTableBody = $('#taskTableBody');
    const taskViewTitle = $('#taskViewTitle');
    const taskViewDesc = $('#taskViewDesc');
    const taskViewProgressText = $('#taskViewProgressText');
    const taskViewProgressFill = $('#taskViewProgressFill');
    const globalStats = $('#globalStats');

    // Modals
    const listModal = $('#listModal');
    const listForm = $('#listForm');
    const listFormId = $('#listFormId');
    const listTitle = $('#listTitle');
    const listDesc = $('#listDesc');
    const listModalTitle = $('#listModalTitle');
    const listSubmitBtn = $('#listSubmitBtn');

    const taskModal = $('#taskModal');
    const taskForm = $('#taskForm');
    const taskFormId = $('#taskFormId');
    const taskFormListId = $('#taskFormListId');
    const taskTitle = $('#taskTitle');
    const taskDesc = $('#taskDesc');
    const taskDue = $('#taskDue');
    const taskPriority = $('#taskPriority');
    const taskStatus = $('#taskStatus');
    const taskModalTitle = $('#taskModalTitle');
    const taskSubmitBtn = $('#taskSubmitBtn');

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  HELPERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function getList(id) {
        return data.lists.find(l => l.id === id);
    }

    function getTask(listId, taskId) {
        const list = getList(listId);
        if (!list) return null;
        return list.tasks.find(t => t.id === taskId);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr + 'T00:00:00');
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getPriorityLabel(p) {
        const map = { HIGH: 'High', MEDIUM: 'Medium', LOW: 'Low' };
        return map[p] || p;
    }

    function getStatusLabel(s) {
        const map = { OPEN: 'Open', CLOSED: 'Closed' };
        return map[s] || s;
    }

    function getPriorityClass(p) {
        return (p || 'LOW').toLowerCase();
    }

    function getStatusClass(s) {
        return (s || 'OPEN').toLowerCase();
    }

    function calcProgress(list) {
        const tasks = list.tasks || [];
        if (tasks.length === 0) return { total: 0, done: 0, pct: 0 };
        const done = tasks.filter(t => t.status === 'CLOSED').length;
        return { total: tasks.length, done, pct: Math.round((done / tasks.length) * 100) };
    }

    function updateGlobalStats() {
        const totalLists = data.lists.length;
        const totalTasks = data.lists.reduce((acc, l) => acc + (l.tasks || []).length, 0);
        globalStats.textContent = `${totalLists} list${totalLists !== 1 ? 's' : ''} · ${totalTasks} task${totalTasks !== 1 ? 's' : ''}`;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  RENDER: DASHBOARD
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function renderDashboard() {
        if (data.lists.length === 0) {
            listGrid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="icon">📭</div>
                    <h3>No task lists yet</h3>
                    <p>Click “+ New List” to get started.</p>
                </div>
            `;
            updateGlobalStats();
            return;
        }

        let html = '';
        data.lists.forEach(list => {
            const prog = calcProgress(list);
            const isComplete = prog.pct === 100 && prog.total > 0;
            html += `
                <div class="list-card" data-list-id="${list.id}">
                    <div class="card-top">
                        <div>
                            <div class="card-title">${escHtml(list.title)}</div>
                            ${list.description ? `<div class="card-desc">${escHtml(list.description)}</div>` : ''}
                        </div>
                    </div>
                    <div class="card-meta">
                        <span class="count">${prog.total} task${prog.total !== 1 ? 's' : ''}</span>
                        <span>·</span>
                        <span>${prog.done} done</span>
                    </div>
                    <div class="progress-wrap">
                        <div class="bar ${isComplete ? 'complete' : ''}" style="width:${prog.pct}%"></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm view-list-btn" data-id="${list.id}">View Tasks</button>
                        <button class="btn btn-outline btn-sm edit-list-btn" data-id="${list.id}">✎</button>
                        <button class="btn btn-danger btn-sm delete-list-btn" data-id="${list.id}">✕</button>
                    </div>
                </div>
            `;
        });
        listGrid.innerHTML = html;
        updateGlobalStats();

        // event listeners
        listGrid.querySelectorAll('.view-list-btn').forEach(btn => {
            btn.addEventListener('click', () => showTaskView(btn.dataset.id));
        });
        listGrid.querySelectorAll('.edit-list-btn').forEach(btn => {
            btn.addEventListener('click', () => openListModal(btn.dataset.id));
        });
        listGrid.querySelectorAll('.delete-list-btn').forEach(btn => {
            btn.addEventListener('click', () => deleteList(btn.dataset.id));
        });
    }

    function escHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  RENDER: TASK VIEW
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function renderTasks() {
        const list = getList(currentListId);
        if (!list) {
            taskTableBody.innerHTML =
                `<tr><td colspan="6" class="empty-tasks">List not found.</td></tr>`;
            return;
        }

        taskViewTitle.textContent = list.title;
        taskViewDesc.textContent = list.description || 'No description';

        const prog = calcProgress(list);
        taskViewProgressText.textContent = `${prog.done} / ${prog.total}`;
        taskViewProgressFill.style.width = `${prog.pct}%`;

        const tasks = list.tasks || [];
        if (tasks.length === 0) {
            taskTableBody.innerHTML =
                `<tr><td colspan="6" class="empty-tasks"><div class="icon">📝</div>No tasks yet — add one above!</td></tr>`;
            return;
        }

        // sort: open first, then by priority
        const sorted = [...tasks].sort((a, b) => {
            if (a.status === 'CLOSED' && b.status !== 'CLOSED') return 1;
            if (a.status !== 'CLOSED' && b.status === 'CLOSED') return -1;
            const order = { HIGH: 0, MEDIUM: 1, LOW: 2 };
            return (order[a.priority] || 1) - (order[b.priority] || 1);
        });

        let html = '';
        sorted.forEach(task => {
            const isClosed = task.status === 'CLOSED';
            html += `
                <tr data-task-id="${task.id}">
                    <td class="task-check">
                        <input type="checkbox" class="toggle-task" ${isClosed ? 'checked' : ''}
                               data-list-id="${currentListId}" data-task-id="${task.id}" />
                    </td>
                    <td class="task-title ${isClosed ? 'closed' : ''}">
                        <span class="main">${escHtml(task.title)}</span>
                        ${task.description ? `<span class="sub">${escHtml(task.description)}</span>` : ''}
                    </td>
                    <td><span class="task-priority ${getPriorityClass(task.priority)}">${getPriorityLabel(task.priority)}</span></td>
                    <td class="task-due">${formatDate(task.dueDate)}</td>
                    <td><span class="task-status-badge ${getStatusClass(task.status)}">${getStatusLabel(task.status)}</span></td>
                    <td style="text-align:right">
                        <div class="task-actions">
                            <button class="btn-icon edit-task-btn" data-list-id="${currentListId}" data-task-id="${task.id}" aria-label="Edit">✎</button>
                            <button class="btn-icon danger delete-task-btn" data-list-id="${currentListId}" data-task-id="${task.id}" aria-label="Delete">✕</button>
                        </div>
                    </td>
                </tr>
            `;
        });
        taskTableBody.innerHTML = html;

        // event listeners: toggle
        taskTableBody.querySelectorAll('.toggle-task').forEach(cb => {
            cb.addEventListener('change', function() {
                const listId = this.dataset.listId;
                const taskId = this.dataset.taskId;
                const checked = this.checked;
                toggleTaskStatus(listId, taskId, checked);
            });
        });

        // edit / delete
        taskTableBody.querySelectorAll('.edit-task-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                openTaskModal(btn.dataset.listId, btn.dataset.taskId);
            });
        });
        taskTableBody.querySelectorAll('.delete-task-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                deleteTask(btn.dataset.listId, btn.dataset.taskId);
            });
        });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  VIEW SWITCHING
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function showDashboard() {
        dashboardView.classList.add('active');
        taskView.classList.remove('active');
        currentListId = null;
        renderDashboard();
    }

    function showTaskView(listId) {
        const list = getList(listId);
        if (!list) return;
        currentListId = listId;
        dashboardView.classList.remove('active');
        taskView.classList.add('active');
        renderTasks();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  CRUD: LISTS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function openListModal(listId) {
        const isEdit = !!listId;
        const list = isEdit ? getList(listId) : null;
        listModalTitle.textContent = isEdit ? 'Edit Task List' : 'New Task List';
        listSubmitBtn.textContent = isEdit ? 'Update List' : 'Create List';
        listFormId.value = isEdit ? listId : '';
        listTitle.value = isEdit ? (list?.title || '') : '';
        listDesc.value = isEdit ? (list?.description || '') : '';
        listModal.classList.add('open');
        listTitle.focus();
    }

    function closeListModal() {
        listModal.classList.remove('open');
        listForm.reset();
        listFormId.value = '';
    }

    function handleListSubmit(e) {
        e.preventDefault();
        const id = listFormId.value;
        const title = listTitle.value.trim();
        const description = listDesc.value.trim();

        if (!title) {
            listTitle.focus();
            listTitle.style.borderColor = 'var(--danger)';
            setTimeout(() => listTitle.style.borderColor = '', 1500);
            return;
        }

        if (id) {
            // edit
            const list = getList(id);
            if (list) {
                list.title = title;
                list.description = description;
                saveData(data);
                closeListModal();
                if (currentListId === id) renderTasks();
                renderDashboard();
            }
        } else {
            // create
            const newList = {
                id: generateId(),
                title,
                description,
                tasks: [],
            };
            data.lists.push(newList);
            saveData(data);
            closeListModal();
            renderDashboard();
        }
    }

    function deleteList(listId) {
        const list = getList(listId);
        if (!list) return;
        const count = (list.tasks || []).length;
        const msg = count > 0 ?
            `Delete “${list.title}” and its ${count} task${count !== 1 ? 's' : ''}?` :
            `Delete “${list.title}”?`;
        if (!confirm(msg)) return;
        data.lists = data.lists.filter(l => l.id !== listId);
        saveData(data);
        if (currentListId === listId) showDashboard();
        else renderDashboard();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  CRUD: TASKS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function openTaskModal(listId, taskId) {
        const isEdit = !!taskId;
        const list = getList(listId);
        if (!list) return;
        const task = isEdit ? getTask(listId, taskId) : null;

        taskModalTitle.textContent = isEdit ? 'Edit Task' : 'New Task';
        taskSubmitBtn.textContent = isEdit ? 'Update Task' : 'Create Task';
        taskFormId.value = isEdit ? taskId : '';
        taskFormListId.value = listId;
        taskTitle.value = isEdit ? (task?.title || '') : '';
        taskDesc.value = isEdit ? (task?.description || '') : '';
        taskDue.value = isEdit ? (task?.dueDate || '') : '';
        taskPriority.value = isEdit ? (task?.priority || 'MEDIUM') : 'MEDIUM';
        taskStatus.value = isEdit ? (task?.status || 'OPEN') : 'OPEN';

        taskModal.classList.add('open');
        taskTitle.focus();
    }

    function closeTaskModal() {
        taskModal.classList.remove('open');
        taskForm.reset();
        taskFormId.value = '';
        taskFormListId.value = '';
    }

    function handleTaskSubmit(e) {
        e.preventDefault();
        const listId = taskFormListId.value;
        const taskId = taskFormId.value;
        const title = taskTitle.value.trim();
        const description = taskDesc.value.trim();
        const dueDate = taskDue.value || '';
        const priority = taskPriority.value;
        const status = taskStatus.value;

        if (!title) {
            taskTitle.focus();
            taskTitle.style.borderColor = 'var(--danger)';
            setTimeout(() => taskTitle.style.borderColor = '', 1500);
            return;
        }

        const list = getList(listId);
        if (!list) return;

        if (taskId) {
            // edit
            const task = getTask(listId, taskId);
            if (task) {
                task.title = title;
                task.description = description;
                task.dueDate = dueDate;
                task.priority = priority;
                task.status = status;
                saveData(data);
                closeTaskModal();
                renderTasks();
                renderDashboard();
            }
        } else {
            // create
            const newTask = {
                id: generateId(),
                title,
                description,
                dueDate,
                priority,
                status,
            };
            list.tasks.push(newTask);
            saveData(data);
            closeTaskModal();
            renderTasks();
            renderDashboard();
        }
    }

    function deleteTask(listId, taskId) {
        const list = getList(listId);
        if (!list) return;
        const task = getTask(listId, taskId);
        if (!task) return;
        if (!confirm(`Delete task “${task.title}”?`)) return;
        list.tasks = list.tasks.filter(t => t.id !== taskId);
        saveData(data);
        renderTasks();
        renderDashboard();
    }

    function toggleTaskStatus(listId, taskId, closed) {
        const task = getTask(listId, taskId);
        if (!task) return;
        task.status = closed ? 'CLOSED' : 'OPEN';
        saveData(data);
        renderTasks();
        renderDashboard();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  MODAL CLOSE HANDLERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.close;
            if (target === 'listModal') closeListModal();
            if (target === 'taskModal') closeTaskModal();
        });
    });

    // click overlay to close
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                if (this.id === 'listModal') closeListModal();
                if (this.id === 'taskModal') closeTaskModal();
            }
        });
    });

    // Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (listModal.classList.contains('open')) closeListModal();
            if (taskModal.classList.contains('open')) closeTaskModal();
        }
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  FORM SUBMITS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    listForm.addEventListener('submit', handleListSubmit);
    taskForm.addEventListener('submit', handleTaskSubmit);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  TOP BUTTONS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    $('#addListBtn').addEventListener('click', () => openListModal(null));

    $('#addTaskBtn').addEventListener('click', () => {
        if (currentListId) openTaskModal(currentListId, null);
    });

    $('#backToDashboard').addEventListener('click', showDashboard);

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  INIT
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    renderDashboard();

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //  (Optional) demo seed data if empty
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    if (data.lists.length === 0) {
        // seed with a sample list
        const sampleList = {
            id: generateId(),
            title: 'Welcome to Task Manager!',
            description: 'Here is a sample list to get you started.',
            tasks: [{
                id: generateId(),
                title: 'Create your first task list',
                description: 'Click “+ New List” to add your own.',
                dueDate: '',
                priority: 'HIGH',
                status: 'OPEN',
            }, {
                id: generateId(),
                title: 'Add some tasks',
                description: 'Each list can have many tasks.',
                dueDate: new Date(Date.now() + 86400000 * 3).toISOString().slice(0, 10),
                priority: 'MEDIUM',
                status: 'OPEN',
            }, {
                id: generateId(),
                title: 'Mark tasks as done',
                description: 'Check the box to close a task.',
                dueDate: '',
                priority: 'LOW',
                status: 'CLOSED',
            }]
        };
        data.lists.push(sampleList);
        saveData(data);
        renderDashboard();
    }
</script>

</body>
</html>
